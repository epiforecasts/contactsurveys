# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  pull_request:
    paths: ["R/**"]

name: document.yaml

permissions: read-all

jobs:
  document:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Same-repo PRs: check out the head branch so doc updates can be
          # pushed back to it. Fork PRs: that branch does not exist here, so
          # check out the merge commit and only verify docs are up to date.
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || github.sha }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::roxygen2
          needs: roxygen2

      - name: Document
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Commit and push changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add man/\* NAMESPACE DESCRIPTION
          git commit -m "Update documentation" || echo "No changes to commit"
          git push origin HEAD

      # Fork PRs cannot be pushed to with the read-only token, so instead fail
      # if the generated documentation is out of date and ask the contributor
      # to run roxygen2::roxygenise() and commit the result.
      - name: Check documentation is up to date
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          if [ -n "$(git status --porcelain man NAMESPACE DESCRIPTION)" ]; then
            echo "::error::Documentation is out of date. Run roxygen2::roxygenise() and commit the changes."
            git diff -- man NAMESPACE DESCRIPTION
            exit 1
          fi
